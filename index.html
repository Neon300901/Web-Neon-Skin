<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Neon Store Order</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#22d3ee;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#22d3ee;
margin:10px 0;
font-weight:bold;
}

button{
background:#22d3ee;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.cart{
background:#020617;
padding:20px;
position:fixed;
right:0;
top:0;
width:280px;
height:100%;
overflow:auto;
}

.cart h3{
margin-top:0;
}

.cart-item{
font-size:14px;
margin-bottom:10px;
}

.total{
font-size:18px;
margin-top:10px;
color:#22d3ee;
}

input{
padding:8px;
border-radius:6px;
border:none;
width:100%;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<div class="logo">NEON STORE</div>
<div>Fish It Item Shop</div>
</header>

<div style="padding:20px">

Username Roblox
<input id="username" placeholder="Masukkan username">

</div>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Dark Matter Scythe</h4>
<div class="price">Rp 84.000</div>

Qty
<input type="number" value="1" min="1" id="qty1">

<button onclick="tambahItem('Dark Matter Scythe',84000,'qty1')">
Tambah
</button>

</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Kitty Guitar</h4>
<div class="price">Rp 76.000</div>

Qty
<input type="number" value="1" min="1" id="qty2">

<button onclick="tambahItem('Kitty Guitar',76000,'qty2')">
Tambah
</button>

</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Void Craft</h4>
<div class="price">Rp 47.000</div>

Qty
<input type="number" value="1" min="1" id="qty3">

<button onclick="tambahItem('Void Craft',47000,'qty3')">
Tambah
</button>

</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>VIP + Luck</h4>
<div class="price">Rp 38.000</div>

Qty
<input type="number" value="1" min="1" id="qty4">

<button onclick="tambahItem('VIP + Luck',38000,'qty4')">
Tambah
</button>

</div>

</div>

<div class="cart">

<h3>Keranjang</h3>

<div id="cartList"></div>

<div class="total">
Total : Rp <span id="total">0</span>
</div>

<br>

<button onclick="orderWA()">
Order via WhatsApp
</button>

</div>

<script>

let cart = []

function tambahItem(nama,harga,qtyId){

let qty = parseInt(document.getElementById(qtyId).value)

let item = cart.find(i=>i.nama===nama)

if(item){

item.qty += qty

}else{

cart.push({
nama:nama,
harga:harga,
qty:qty
})

}

renderCart()

}

function renderCart(){

let list = document.getElementById("cartList")

list.innerHTML=""

let total = 0

cart.forEach(item=>{

let subtotal = item.harga * item.qty

total += subtotal

list.innerHTML +=
`<div class="cart-item">
${item.nama} x${item.qty}
<br>
Rp ${subtotal.toLocaleString("id-ID")}
</div>`

})

document.getElementById("total").innerText =
total.toLocaleString("id-ID")

}

function orderWA(){

let username = document.getElementById("username").value

let pesanItem=""

let total=0

cart.forEach(item=>{

let subtotal = item.harga * item.qty

pesanItem += `${item.nama} x${item.qty} = Rp ${subtotal.toLocaleString("id-ID")}\n`

total += subtotal

})

let pesan =
`ORDER NEON STORE

Username : ${username}

Item :
${pesanItem}

Total : Rp ${total.toLocaleString("id-ID")}

Saya sudah melakukan pembayaran via QRIS.
Berikut bukti transfer saya.`

let url =
"https://wa.me/6285804197934?text="+encodeURIComponent(pesan)

window.open(url)

}

</script>

</body>
</html>
